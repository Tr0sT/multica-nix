name: Build Multica packages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Check flake
        run: nix flake check

      - name: Build packages
        run: |
          nix build .#multica-server --out-link result-server
          nix build .#multica-cli --out-link result-cli
          nix build .#multica-web --out-link result-web

      - name: Export Nix store paths
        run: |
          nix-store --export \
            $(readlink -f result-server) \
            $(readlink -f result-cli) \
            $(readlink -f result-web) \
            > multica.nar

      - name: Upload Nix artifact
        uses: actions/upload-artifact@v4
        with:
          name: multica-nar
          path: multica.nar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Multica build ${{ github.run_number }}
          files: multica.nar
