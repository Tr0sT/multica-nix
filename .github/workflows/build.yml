name: Build Multica packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: nuclearband
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Check flake
        run: nix flake check

      - name: Build packages
        run: |
          nix build .#multica-server --out-link result-server
          nix build .#multica-cli --out-link result-cli
          nix build .#multica-web --out-link result-web

      - name: Push packages to Cachix
        run: |
          cachix push nuclearband $(readlink -f result-server)
          cachix push nuclearband $(readlink -f result-cli)
          cachix push nuclearband $(readlink -f result-web)
