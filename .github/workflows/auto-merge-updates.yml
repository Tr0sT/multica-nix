name: Auto-merge Multica updates

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-update-pr:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Merge eligible update PR
        env:
          GH_TOKEN: ${{ secrets.UPDATE_BOT_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER:-}" ]; then
            echo "No pull request is associated with this CI run."
            exit 0
          fi

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state,isDraft,baseRefName,headRefName,headRefOid,title)"
          state="$(jq -r '.state' <<< "$pr_json")"
          is_draft="$(jq -r '.isDraft' <<< "$pr_json")"
          base_ref="$(jq -r '.baseRefName' <<< "$pr_json")"
          head_ref="$(jq -r '.headRefName' <<< "$pr_json")"
          pr_head_sha="$(jq -r '.headRefOid' <<< "$pr_json")"
          title="$(jq -r '.title' <<< "$pr_json")"

          if [ "$state" != "OPEN" ]; then
            echo "PR #$PR_NUMBER is not open: $state"
            exit 0
          fi

          if [ "$is_draft" = "true" ]; then
            echo "PR #$PR_NUMBER is a draft."
            exit 0
          fi

          if [ "$base_ref" != "main" ]; then
            echo "PR #$PR_NUMBER targets $base_ref, not main."
            exit 0
          fi

          case "$head_ref" in
            update-multica-*) ;;
            *)
              echo "PR #$PR_NUMBER is not a Multica update branch: $head_ref"
              exit 0
              ;;
          esac

          case "$title" in
            "chore: update multica to "*) ;;
            *)
              echo "PR #$PR_NUMBER does not look like an automated Multica update: $title"
              exit 0
              ;;
          esac

          if [ "$pr_head_sha" != "$HEAD_SHA" ]; then
            echo "PR #$PR_NUMBER moved after CI: expected $HEAD_SHA, found $pr_head_sha"
            exit 1
          fi

          # GitHub can report a successful workflow_run slightly before the
          # required check is visible to branch protection. Retry the normal
          # merge briefly instead of relying only on native auto-merge state.
          for attempt in 1 2 3 4 5; do
            if gh pr merge "$PR_NUMBER" \
              --repo "$REPO" \
              --squash \
              --delete-branch \
              --match-head-commit "$HEAD_SHA"; then
              exit 0
            fi

            echo "Merge is still blocked after successful CI (attempt $attempt/5); retrying in 10 seconds."
            sleep 10
          done

          echo "Direct merge is still blocked; enabling native auto-merge as a fallback."
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --auto \
            --squash \
            --delete-branch \
            --match-head-commit "$HEAD_SHA"
